<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descargador</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green:#8fca00;
      --green-dark:#76aa00;
      --bg:#f6f7f9;
      --panel:#ffffff;
      --text:#2f3136;
      --muted:#7a7f87;
      --border:#e5e7eb;
      --danger:#d93025;
      --warning:#d97706;
      --ok:#15803d;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
      font-family:'Lato',sans-serif;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:240px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:#fff;
      border-right:1px solid var(--border);
      padding:20px;
      position:sticky;
      top:0;
      height:100vh;
    }

    .brand-title{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .brand-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .brand-btn{
      width:100%;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:14px 16px;
      text-align:left;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      transition:.15s ease;
    }

    .brand-btn:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .brand-btn.active{
      background:var(--green);
      border-color:var(--green);
      color:#fff;
    }

    .content{
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      margin:0;
      font-size:24px;
      line-height:1.1;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      min-height:44px;
      padding:12px 16px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .btn-primary{
      background:var(--green);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--green-dark);
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .btn-danger{
      background:#fff3f2;
      color:var(--danger);
      border:1px solid #ffd5d1;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:20px;
    }

    .panel-body{
      padding:18px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:12px;
      align-items:end;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#4a4f57;
    }

    .file-wrap{
      position:relative;
    }

    .file-input{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
    }

    .status-row{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-top:16px;
    }

    .stat{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      background:#fff;
    }

    .stat .n{
      display:block;
      font-size:24px;
      font-weight:700;
      line-height:1;
      margin-bottom:6px;
    }

    .stat .t{
      display:block;
      font-size:12px;
      color:var(--muted);
    }

    .status-line{
      margin-top:16px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    .progress{
      margin-top:12px;
      height:10px;
      background:#eef1f4;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--green),#b4df37);
      transition:width .2s ease;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:920px;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      vertical-align:middle;
      font-size:13px;
    }

    th{
      font-size:12px;
      color:#68707a;
      text-transform:uppercase;
      letter-spacing:.05em;
      background:#fafbfc;
      position:sticky;
      top:0;
      z-index:1;
    }

    .thumb{
      width:72px;
      height:72px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      border:1px solid var(--border);
      background:#fff;
      white-space:nowrap;
    }

    .chip.ok{
      color:var(--ok);
      background:#f1fbf4;
      border-color:#cce9d3;
    }

    .chip.warn{
      color:var(--warning);
      background:#fff8ed;
      border-color:#f3ddbe;
    }

    .chip.err{
      color:var(--danger);
      background:#fff5f4;
      border-color:#f7c9c3;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break:break-word;
    }

    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .row-actions .btn{
      min-height:36px;
      padding:8px 12px;
      font-size:12px;
    }

    .empty{
      padding:44px 20px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .errors{
      background:#fff5f4;
      border:1px solid #f7c9c3;
      border-radius:16px;
      padding:16px;
    }

    .errors h3{
      margin:0 0 10px;
      font-size:15px;
      color:var(--danger);
    }

    .errors ol{
      margin:0;
      padding-left:18px;
      font-size:13px;
      color:#6a2a24;
      line-height:1.5;
    }

    @media (max-width: 1100px){
      .app{
        grid-template-columns:1fr;
      }

      .sidebar{
        position:static;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--border);
      }

      .brand-list{
        flex-direction:row;
        flex-wrap:wrap;
      }

      .brand-btn{
        width:auto;
        min-width:140px;
      }

      .controls{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 700px){
      .status-row{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand-title">Marcas</div>
      <div class="brand-list" id="brandList"></div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="title-wrap">
          <h1>Descargador</h1>
          <p id="activeBrandLabel">Mango</p>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" id="btnDownloadTemplate">Plantilla</button>
          <button class="btn btn-secondary" id="btnClear">Limpiar</button>
          <button class="btn btn-primary" id="btnProcess">Procesar</button>
          <button class="btn btn-primary" id="btnDownloadZip" disabled>Descargar ZIP</button>
        </div>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div class="controls">
            <div class="field">
              <label for="excelFile">Excel</label>
              <input id="excelFile" class="file-input" type="file" accept=".xlsx,.xls,.csv" />
            </div>

            <div class="field">
              <label>&nbsp;</label>
              <button class="btn btn-secondary" id="btnLoadDemo">Demo</button>
            </div>

            <div class="field">
              <label>&nbsp;</label>
              <button class="btn btn-secondary" id="btnCopyManifest" disabled>Copiar manifiesto</button>
            </div>
          </div>

          <div class="status-row">
            <div class="stat">
              <span class="n" id="statRows">0</span>
              <span class="t">Filas</span>
            </div>
            <div class="stat">
              <span class="n" id="statReady">0</span>
              <span class="t">Listas</span>
            </div>
            <div class="stat">
              <span class="n" id="statErrors">0</span>
              <span class="t">Errores</span>
            </div>
            <div class="stat">
              <span class="n" id="statBrand">M</span>
              <span class="t">Marca activa</span>
            </div>
          </div>

          <div class="status-line" id="statusLine">Esperando archivo...</div>
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body" id="resultsPanel">
          <div class="empty">Carga un Excel y presiona Procesar.</div>
        </div>
      </section>

      <section id="errorsPanel"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <script>
    const BRANDS = {
      mango: {
        id: "mango",
        label: "Mango",
        short: "M",
        buildUrl(code) {
          return `https://media.mango.com/is/image/punto/${code}?wid=2048`;
        },
        parseCode(code) {
          const clean = String(code || "").trim();
          const match = clean.match(/^(.+)-(\d{2})-(\d{3})$/);
          if (!match) return null;

          return {
            raw: clean,
            model: match[1],
            color: match[2],
            sourceView: match[3]
          };
        },
        mapView(sourceView) {
          const hiddenMap = {
            "002": 1,
            "001": 2,
            "003": 3,
            "004": 4,
            "023": 5,
            "021": 6,
            "030": 7
          };
          return hiddenMap[sourceView] ?? null;
        }
      }
    };

    const DEMO_ROWS = [
      { mangoCode: "27055968-32-002", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-001", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-003", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-004", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-023", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-021", skuFalabella: "12345678" },
      { mangoCode: "27055968-32-030", skuFalabella: "12345678" }
    ];

    const state = {
      activeBrand: "mango",
      rawRows: [],
      items: [],
      errors: [],
      manifestText: "",
      sourceFileName: ""
    };

    const els = {
      brandList: document.getElementById("brandList"),
      activeBrandLabel: document.getElementById("activeBrandLabel"),
      excelFile: document.getElementById("excelFile"),
      btnDownloadTemplate: document.getElementById("btnDownloadTemplate"),
      btnLoadDemo: document.getElementById("btnLoadDemo"),
      btnClear: document.getElementById("btnClear"),
      btnProcess: document.getElementById("btnProcess"),
      btnDownloadZip: document.getElementById("btnDownloadZip"),
      btnCopyManifest: document.getElementById("btnCopyManifest"),
      statRows: document.getElementById("statRows"),
      statReady: document.getElementById("statReady"),
      statErrors: document.getElementById("statErrors"),
      statBrand: document.getElementById("statBrand"),
      statusLine: document.getElementById("statusLine"),
      progressBar: document.getElementById("progressBar"),
      resultsPanel: document.getElementById("resultsPanel"),
      errorsPanel: document.getElementById("errorsPanel")
    };

    function init() {
      renderBrands();
      bindEvents();
      renderStats();
    }

    function bindEvents() {
      els.excelFile.addEventListener("change", handleExcelChange);
      els.btnDownloadTemplate.addEventListener("click", downloadTemplate);
      els.btnLoadDemo.addEventListener("click", loadDemo);
      els.btnClear.addEventListener("click", clearAll);
      els.btnProcess.addEventListener("click", processRows);
      els.btnDownloadZip.addEventListener("click", downloadZip);
      els.btnCopyManifest.addEventListener("click", copyManifest);
    }

    function renderBrands() {
      els.brandList.innerHTML = Object.values(BRANDS).map(brand => {
        const active = brand.id === state.activeBrand ? "active" : "";
        return `
          <button class="brand-btn ${active}" data-brand="${brand.id}">
            ${escapeHtml(brand.label)}
          </button>
        `;
      }).join("");

      els.brandList.querySelectorAll(".brand-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const brandId = btn.getAttribute("data-brand");
          if (!BRANDS[brandId]) return;
          state.activeBrand = brandId;
          renderBrands();
          renderStats();
          els.activeBrandLabel.textContent = BRANDS[brandId].label;
          setStatus(`${BRANDS[brandId].label} activo.`);
        });
      });
    }

    function setStatus(text) {
      els.statusLine.textContent = text;
    }

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      els.progressBar.style.width = value + "%";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeHeader(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function guessColumnIndexes(firstRow) {
      const normalized = firstRow.map(normalizeHeader);

      const mangoCandidates = [
        "modelocolormango",
        "codigomango",
        "mango",
        "modelomango",
        "referenciamango"
      ];

      const skuCandidates = [
        "skufalabella",
        "skufala",
        "falabella",
        "sku",
        "skuftb"
      ];

      let mangoIndex = normalized.findIndex(v => mangoCandidates.includes(v));
      let skuIndex = normalized.findIndex(v => skuCandidates.includes(v));

      const hasHeader = mangoIndex !== -1 || skuIndex !== -1;

      if (mangoIndex === -1) mangoIndex = 0;
      if (skuIndex === -1) skuIndex = 1;

      return {
        mangoIndex,
        skuIndex,
        startRow: hasHeader ? 1 : 0
      };
    }

    async function handleExcelChange(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const rows = await parseExcelFile(file);
        state.rawRows = rows;
        state.sourceFileName = file.name;
        state.items = [];
        state.errors = [];
        state.manifestText = "";
        renderStats();
        renderResults();
        renderErrors();
        setStatus(`${rows.length} fila(s) cargada(s) desde ${file.name}.`);
        setProgress(0);
      } catch (error) {
        console.error(error);
        setStatus("No se pudo leer el archivo.");
      }
    }

    async function parseExcelFile(file) {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

      if (!matrix.length) return [];

      const { mangoIndex, skuIndex, startRow } = guessColumnIndexes(matrix[0]);

      const rows = [];
      for (let i = startRow; i < matrix.length; i++) {
        const row = matrix[i];
        const mangoCode = String(row[mangoIndex] ?? "").trim();
        const skuFalabella = String(row[skuIndex] ?? "").trim();

        if (!mangoCode && !skuFalabella) continue;

        rows.push({
          rowNumber: i + 1,
          mangoCode,
          skuFalabella
        });
      }

      return rows;
    }

    function downloadTemplate() {
      const ws = XLSX.utils.json_to_sheet([
        { "MODELO COLOR MANGO": "27055968-32-002", "SKU FALABELLA": "12345678" },
        { "MODELO COLOR MANGO": "27055968-32-001", "SKU FALABELLA": "12345678" }
      ]);

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Plantilla");

      const arrayBuffer = XLSX.write(wb, { bookType: "xlsx", type: "array" });
      const blob = new Blob([arrayBuffer], {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      });

      saveAs(blob, "plantilla-mango-falabella.xlsx");
    }

    function loadDemo() {
      state.rawRows = DEMO_ROWS.map((row, index) => ({
        rowNumber: index + 1,
        mangoCode: row.mangoCode,
        skuFalabella: row.skuFalabella
      }));

      state.sourceFileName = "demo";
      state.items = [];
      state.errors = [];
      state.manifestText = "";
      renderStats();
      renderResults();
      renderErrors();
      setStatus("Demo cargada.");
      setProgress(0);
    }

    function clearAll() {
      els.excelFile.value = "";
      state.rawRows = [];
      state.items = [];
      state.errors = [];
      state.manifestText = "";
      state.sourceFileName = "";
      renderStats();
      renderResults();
      renderErrors();
      setStatus("Limpio.");
      setProgress(0);
    }

    function processRows() {
      const brand = BRANDS[state.activeBrand];
      if (!brand) return;

      if (!state.rawRows.length) {
        setStatus("Carga un Excel primero.");
        return;
      }

      state.items = [];
      state.errors = [];
      state.manifestText = "";

      const usedNames = new Map();

      state.rawRows.forEach(row => {
        const mangoCode = String(row.mangoCode || "").trim();
        const skuFalabella = String(row.skuFalabella || "").trim();

        if (!mangoCode || !skuFalabella) {
          state.errors.push(`Fila ${row.rowNumber}: faltan datos.`);
          return;
        }

        const parsed = brand.parseCode(mangoCode);
        if (!parsed) {
          state.errors.push(`Fila ${row.rowNumber}: código inválido "${mangoCode}".`);
          return;
        }

        const targetView = brand.mapView(parsed.sourceView);
        if (!targetView) {
          state.errors.push(`Fila ${row.rowNumber}: vista "${parsed.sourceView}" sin regla.`);
          return;
        }

        const outputFilename = `${skuFalabella}_${targetView}.jpg`;
        const duplicateKey = outputFilename.toLowerCase();

        if (usedNames.has(duplicateKey)) {
          state.errors.push(`Fila ${row.rowNumber}: nombre repetido "${outputFilename}".`);
          return;
        }

        usedNames.set(duplicateKey, true);

        state.items.push({
          rowNumber: row.rowNumber,
          mangoCode,
          skuFalabella,
          sourceView: parsed.sourceView,
          targetView,
          outputFilename,
          imageUrl: brand.buildUrl(mangoCode),
          status: "ready"
        });
      });

      state.items.sort((a, b) => {
        if (a.skuFalabella === b.skuFalabella) return a.targetView - b.targetView;
        return a.skuFalabella.localeCompare(b.skuFalabella, undefined, { numeric: true, sensitivity: "base" });
      });

      state.manifestText = buildManifestText();
      renderStats();
      renderResults();
      renderErrors();

      if (state.items.length) {
        setStatus(`${state.items.length} imagen(es) lista(s).`);
      } else {
        setStatus("No hubo resultados válidos.");
      }

      setProgress(0);
    }

    function buildManifestText() {
      return state.items.map(item => {
        return [
          `Fila:${item.rowNumber}`,
          `Marca:${state.activeBrand}`,
          `Mango:${item.mangoCode}`,
          `SKU:${item.skuFalabella}`,
          `VistaOrigen:${item.sourceView}`,
          `VistaFinal:${item.targetView}`,
          `Archivo:${item.outputFilename}`,
          `URL:${item.imageUrl}`
        ].join(" | ");
      }).join("\n");
    }

    function renderStats() {
      els.statRows.textContent = String(state.rawRows.length);
      els.statReady.textContent = String(state.items.length);
      els.statErrors.textContent = String(state.errors.length);
      els.statBrand.textContent = BRANDS[state.activeBrand]?.short || "—";
      els.btnDownloadZip.disabled = state.items.length === 0;
      els.btnCopyManifest.disabled = !state.manifestText;
      els.activeBrandLabel.textContent = BRANDS[state.activeBrand]?.label || "";
    }

    function renderResults() {
      if (!state.rawRows.length && !state.items.length) {
        els.resultsPanel.innerHTML = `<div class="empty">Carga un Excel y presiona Procesar.</div>`;
        return;
      }

      if (!state.items.length) {
        els.resultsPanel.innerHTML = `<div class="empty">No hay filas listas todavía.</div>`;
        return;
      }

      const rowsHtml = state.items.map(item => {
        return `
          <tr>
            <td>${item.rowNumber}</td>
            <td>
              <div class="thumb">
                <img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.outputFilename)}" loading="lazy">
              </div>
            </td>
            <td class="mono">${escapeHtml(item.mangoCode)}</td>
            <td class="mono">${escapeHtml(item.skuFalabella)}</td>
            <td class="mono">${escapeHtml(item.outputFilename)}</td>
            <td><span class="chip ok">Lista</span></td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary" data-open="${escapeHtml(item.imageUrl)}">Abrir</button>
                <button class="btn btn-primary" data-download="${escapeHtml(item.rowNumber)}">Descargar</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      els.resultsPanel.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fila</th>
                <th>Preview</th>
                <th>Mango</th>
                <th>SKU Falabella</th>
                <th>Archivo final</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;

      els.resultsPanel.querySelectorAll("[data-open]").forEach(btn => {
        btn.addEventListener("click", () => {
          const url = btn.getAttribute("data-open");
          window.open(url, "_blank", "noopener,noreferrer");
        });
      });

      els.resultsPanel.querySelectorAll("[data-download]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const rowNumber = Number(btn.getAttribute("data-download"));
          const item = state.items.find(x => x.rowNumber === rowNumber);
          if (!item) return;
          await downloadSingle(item);
        });
      });
    }

    function renderErrors() {
      if (!state.errors.length) {
        els.errorsPanel.innerHTML = "";
        return;
      }

      els.errorsPanel.innerHTML = `
        <section class="errors">
          <h3>Errores</h3>
          <ol>
            ${state.errors.map(err => `<li>${escapeHtml(err)}</li>`).join("")}
          </ol>
        </section>
      `;
    }

    async function fetchBlob(url) {
      const response = await fetch(url, {
        method: "GET",
        mode: "cors",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.blob();
    }

    function guessExtension(blob) {
      const type = String(blob?.type || "").toLowerCase();
      if (type.includes("png")) return "png";
      if (type.includes("webp")) return "webp";
      return "jpg";
    }

    async function downloadSingle(item) {
      try {
        setStatus(`Descargando ${item.outputFilename}...`);
        setProgress(20);

        const blob = await fetchBlob(item.imageUrl);
        const ext = guessExtension(blob);
        const finalName = item.outputFilename.replace(/\.jpg$/i, `.${ext}`);

        saveAs(blob, finalName);

        setProgress(100);
        setStatus(`Descarga completada: ${finalName}`);
      } catch (error) {
        console.error(error);
        setProgress(0);
        setStatus(`No se pudo descargar ${item.outputFilename}.`);
      }
    }

    async function downloadZip() {
      if (!state.items.length) {
        setStatus("No hay imágenes listas.");
        return;
      }

      els.btnDownloadZip.disabled = true;
      els.btnProcess.disabled = true;
      els.btnCopyManifest.disabled = true;

      try {
        const zip = new JSZip();
        let done = 0;
        let failed = 0;
        const total = state.items.length;

        setProgress(0);
        setStatus(`Preparando ZIP... 0/${total}`);

        for (const item of state.items) {
          try {
            const blob = await fetchBlob(item.imageUrl);
            const ext = guessExtension(blob);
            const finalName = item.outputFilename.replace(/\.jpg$/i, `.${ext}`);
            zip.file(finalName, blob);
          } catch (error) {
            console.error(error);
            failed++;
            state.errors.push(`No se pudo descargar ${item.mangoCode}.`);
          }

          done++;
          setProgress(Math.round((done / total) * 100));
          setStatus(`Preparando ZIP... ${done}/${total}`);
        }

        if (state.manifestText) {
          zip.file("manifest.txt", state.manifestText);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const zipName = buildZipName();

        saveAs(zipBlob, zipName);
        renderErrors();

        if (failed > 0) {
          setStatus(`ZIP generado con ${failed} falla(s).`);
        } else {
          setStatus(`ZIP generado: ${zipName}`);
        }
      } catch (error) {
        console.error(error);
        setProgress(0);
        setStatus("No se pudo generar el ZIP.");
      } finally {
        els.btnDownloadZip.disabled = state.items.length === 0;
        els.btnProcess.disabled = false;
        els.btnCopyManifest.disabled = !state.manifestText;
      }
    }

    function buildZipName() {
      const now = new Date();
      const YYYY = now.getFullYear();
      const MM = String(now.getMonth() + 1).padStart(2, "0");
      const DD = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      return `${state.activeBrand}-${YYYY}${MM}${DD}-${hh}${mm}.zip`;
    }

    async function copyManifest() {
      if (!state.manifestText) return;

      try {
        await navigator.clipboard.writeText(state.manifestText);
        setStatus("Manifiesto copiado.");
      } catch (error) {
        console.error(error);
        setStatus("No se pudo copiar el manifiesto.");
      }
    }

    init();
  </script>
</body>
</html>
