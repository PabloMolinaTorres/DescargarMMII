<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descargador</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green:#8fca00;
      --green-dark:#76aa00;
      --bg:#f6f7f9;
      --panel:#ffffff;
      --text:#2f3136;
      --muted:#7a7f87;
      --border:#e5e7eb;
      --danger:#d93025;
      --ok:#15803d;
      --warn:#f59e0b;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
      font-family:'Lato',sans-serif;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:240px 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:#fff;
      border-right:1px solid var(--border);
      padding:20px;
      position:sticky;
      top:0;
      height:100vh;
    }

    .brand-title{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .brand-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .brand-btn{
      width:100%;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:12px;
      text-align:left;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      transition:.15s ease;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-btn:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .brand-btn.active{
      background:var(--green);
      border-color:var(--green);
      color:#fff;
    }

    .brand-icon{
      width:38px;
      height:38px;
      border-radius:10px;
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      font-size:10px;
      font-weight:700;
      color:#111;
      letter-spacing:.08em;
      line-height:1;
    }

    .brand-btn.active .brand-icon{
      border-color:rgba(255,255,255,.35);
    }

    .content{
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      margin:0;
      font-size:24px;
      line-height:1.1;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      min-height:44px;
      padding:12px 16px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
    }

    .btn-primary{
      background:var(--green);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--green-dark);
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:20px;
    }

    .panel-body{
      padding:18px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      align-items:end;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
      color:#4a4f57;
    }

    .file-input{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:12px 14px;
      font-size:14px;
      color:var(--text);
    }

    .file-meta{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    .status-line{
      margin-top:16px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    .progress{
      margin-top:12px;
      height:10px;
      background:#eef1f4;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--green),#b4df37);
      transition:width .2s ease;
    }

    .summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--border);
      font-size:12px;
      font-weight:700;
    }

    .etam-request-box{
      margin-top:12px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .etam-request-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .etam-request-text{
      font-size:13px;
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .etam-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      flex-shrink:0;
      background:#cbd5e1;
    }

    .etam-dot.idle{
      background:#cbd5e1;
    }

    .etam-dot.loading{
      background:#f59e0b;
    }

    .etam-dot.success{
      background:#16a34a;
    }

    .etam-dot.warn{
      background:#f59e0b;
    }

    .etam-dot.error{
      background:#dc2626;
    }

    .etam-spinner{
      width:16px;
      height:16px;
      border-radius:999px;
      border:2px solid #dbe3ea;
      border-top-color:var(--green);
      animation:etamSpin 0.8s linear infinite;
      flex-shrink:0;
    }

    @keyframes etamSpin{
      to{
        transform:rotate(360deg);
      }
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1160px;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      vertical-align:middle;
      font-size:13px;
    }

    th{
      font-size:12px;
      color:#68707a;
      text-transform:uppercase;
      letter-spacing:.05em;
      background:#fafbfc;
      position:sticky;
      top:0;
      z-index:1;
    }

    .thumb{
      width:72px;
      height:72px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      border:1px solid var(--border);
      background:#fff;
      white-space:nowrap;
    }

    .chip.ok{
      color:var(--ok);
      background:#f1fbf4;
      border-color:#cce9d3;
    }

    .chip.warn{
      color:#8a5a00;
      background:#fff8e7;
      border-color:#f2d39b;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break:break-word;
    }

    .row-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .row-actions .btn{
      min-height:36px;
      padding:8px 12px;
      font-size:12px;
    }

    .empty{
      padding:44px 20px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .errors{
      background:#fff5f4;
      border:1px solid #f7c9c3;
      border-radius:16px;
      padding:16px;
    }

    .errors h3{
      margin:0 0 10px;
      font-size:15px;
      color:var(--danger);
    }

    .errors ol{
      margin:0;
      padding-left:18px;
      font-size:13px;
      color:#6a2a24;
      line-height:1.5;
    }

    @media (max-width: 1100px){
      .app{
        grid-template-columns:1fr;
      }

      .sidebar{
        position:static;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--border);
      }

      .brand-list{
        flex-direction:row;
        flex-wrap:wrap;
      }

      .brand-btn{
        width:auto;
        min-width:160px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand-title">Marcas</div>
      <div class="brand-list" id="brandList"></div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="title-wrap">
          <h1>Descargador</h1>
          <p id="activeBrandLabel">Mango Mujer / Teen / Kid</p>
        </div>

        <div class="actions">
          <button class="btn btn-secondary" id="btnDownloadTemplate">Descargar plantilla</button>
          <button class="btn btn-secondary" id="btnClear">Limpiar</button>
          <button class="btn btn-primary" id="btnProcess">Procesar</button>
          <button class="btn btn-primary" id="btnDownloadZip" disabled>Descargar ZIP</button>
        </div>
      </div>

      <section class="panel">
        <div class="panel-body">
          <div class="controls">
            <div class="field">
              <label for="excelFile">Excel</label>
              <input id="excelFile" class="file-input" type="file" accept=".xlsx,.xls,.csv" />
              <div class="file-meta" id="fileMeta">Sin archivo cargado.</div>
            </div>
          </div>

          <div class="summary">
            <div class="pill">Filas cargadas: <span id="summaryRows">0</span></div>
            <div class="pill">Imágenes listas: <span id="summaryReady">0</span></div>
            <div class="pill">Errores: <span id="summaryErrors">0</span></div>
          </div>

          <div class="etam-request-box" id="etamRequestBox" style="display:none;">
            <div class="etam-request-left">
              <span class="etam-dot idle" id="etamDot"></span>
              <span class="etam-request-text" id="etamRequestText">ETAM en espera</span>
            </div>
            <div class="etam-spinner" id="etamSpinner" style="display:none;"></div>
          </div>

          <div class="status-line" id="statusLine">Esperando archivo...</div>
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-body" id="resultsPanel">
          <div class="empty">Carga un Excel y presiona Procesar.</div>
        </div>
      </section>

      <section id="errorsPanel"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <script>
    const ETAM_BACKEND_URL = "https://etam-backend.vercel.app/api/process";
    const ETAM_BATCH_SIZE = 5;
    const ETAM_BATCH_TIMEOUT_MS = 180000;

    function createModelColorBrand({ id, label, iconText, candidateViews }) {
      return {
        id,
        label,
        iconText,
        templateHeader: `Modelo ${label.toLowerCase()}`,
        parseCode(code) {
          const clean = String(code || "").trim();

          const exactMatch = clean.match(/^(.+)-([A-Za-z0-9]{2,3})-(\d{3})$/);
          if (exactMatch) {
            return {
              type: "exact",
              raw: clean,
              model: exactMatch[1],
              color: exactMatch[2],
              sourceView: exactMatch[3]
            };
          }

          const baseMatch = clean.match(/^(.+)-([A-Za-z0-9]{2,3})$/);
          if (baseMatch) {
            return {
              type: "base",
              raw: clean,
              model: baseMatch[1],
              color: baseMatch[2],
              sourceView: null
            };
          }

          return null;
        },
        getCandidateEntries(parsed) {
          if (parsed.type === "exact" && parsed.sourceView) {
            return [{
              displayCode: `${parsed.model}-${parsed.color}-${parsed.sourceView}`,
              sourceLabel: parsed.sourceView,
              url: `https://media.mango.com/is/image/punto/${parsed.model}-${parsed.color}-${parsed.sourceView}?wid=2048`
            }];
          }

          return candidateViews.map(view => ({
            displayCode: `${parsed.model}-${parsed.color}-${view}`,
            sourceLabel: view,
            url: `https://media.mango.com/is/image/punto/${parsed.model}-${parsed.color}-${view}?wid=2048`
          }));
        }
      };
    }

    function createEtamBrand() {
      return {
        id: "etam",
        label: "ETAM",
        iconText: "ETAM",
        templateHeader: "Modelo etam"
      };
    }

    const BRANDS = {
      mango: createModelColorBrand({
        id: "mango",
        label: "Mango Mujer / Teen / Kid",
        iconText: "MNG",
        candidateViews: ["002", "007", "001", "003", "004", "558", "081", "084", "082", "023", "021", "022", "030"]
      }),

      mango_man: createModelColorBrand({
        id: "mango_man",
        label: "Mango Man",
        iconText: "MAN",
        candidateViews: ["002", "001", "003", "004", "008", "558", "007", "023", "021", "030"]
      }),

      mango_accesorio: createModelColorBrand({
        id: "mango_accesorio",
        label: "Mango Accesorio / Calzado",
        iconText: "ACC",
        candidateViews: ["051", "016", "052", "055", "053", "054", "061", "056"]
      }),

      etam: createEtamBrand()
    };

    const state = {
      activeBrand: "mango",
      rawRows: [],
      items: [],
      errors: [],
      manifestText: "",
      sourceFileName: "",
      rowResults: [],
      etamFinalZipBlob: null,
      etamFinalZipName: ""
    };

    const els = {
      brandList: document.getElementById("brandList"),
      activeBrandLabel: document.getElementById("activeBrandLabel"),
      excelFile: document.getElementById("excelFile"),
      fileMeta: document.getElementById("fileMeta"),
      btnDownloadTemplate: document.getElementById("btnDownloadTemplate"),
      btnClear: document.getElementById("btnClear"),
      btnProcess: document.getElementById("btnProcess"),
      btnDownloadZip: document.getElementById("btnDownloadZip"),
      summaryRows: document.getElementById("summaryRows"),
      summaryReady: document.getElementById("summaryReady"),
      summaryErrors: document.getElementById("summaryErrors"),
      statusLine: document.getElementById("statusLine"),
      progressBar: document.getElementById("progressBar"),
      resultsPanel: document.getElementById("resultsPanel"),
      errorsPanel: document.getElementById("errorsPanel"),
      etamRequestBox: document.getElementById("etamRequestBox"),
      etamDot: document.getElementById("etamDot"),
      etamRequestText: document.getElementById("etamRequestText"),
      etamSpinner: document.getElementById("etamSpinner")
    };

    function init() {
      renderBrands();
      bindEvents();
      renderSummary();
      updateEtamUI();
      setEtamRequestState("idle", "ETAM en espera");
    }

    function bindEvents() {
      els.excelFile.addEventListener("change", handleExcelChange);
      els.btnDownloadTemplate.addEventListener("click", downloadTemplate);
      els.btnClear.addEventListener("click", clearAll);
      els.btnProcess.addEventListener("click", processRows);
      els.btnDownloadZip.addEventListener("click", downloadZip);
    }

    function revokePreviewUrls() {
      state.items.forEach(item => {
        if (item.previewUrl && item.previewUrl.startsWith("blob:")) {
          try {
            URL.revokeObjectURL(item.previewUrl);
          } catch (_) {}
        }
      });
    }

    function renderBrands() {
      els.brandList.innerHTML = Object.values(BRANDS).map(brand => {
        const active = brand.id === state.activeBrand ? "active" : "";
        return `
          <button class="brand-btn ${active}" data-brand="${brand.id}">
            <span class="brand-icon">${brand.iconText}</span>
            <span>${escapeHtml(brand.label)}</span>
          </button>
        `;
      }).join("");

      els.brandList.querySelectorAll(".brand-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const brandId = btn.getAttribute("data-brand");
          if (!BRANDS[brandId]) return;
          state.activeBrand = brandId;
          renderBrands();
          renderSummary();
          updateEtamUI();
          els.activeBrandLabel.textContent = BRANDS[brandId].label;

          if (brandId === "etam") {
            setStatus("ETAM usa backend y procesamiento por bloques automáticos.");
            setEtamRequestState("idle", "ETAM en espera");
          } else {
            setStatus(`${BRANDS[brandId].label} activo.`);
          }

          renderResults();
          renderErrors();
        });
      });
    }

    function updateEtamUI() {
      const isEtam = state.activeBrand === "etam";
      els.btnProcess.textContent = isEtam ? "Procesar ETAM" : "Procesar";
      els.btnDownloadZip.style.display = "inline-flex";
      els.etamRequestBox.style.display = isEtam ? "flex" : "none";
    }

    function setEtamRequestState(mode, text) {
      els.etamRequestText.textContent = text;
      els.etamDot.className = `etam-dot ${mode}`;
      els.etamSpinner.style.display = mode === "loading" ? "block" : "none";
    }

    function setStatus(text) {
      els.statusLine.textContent = text;
    }

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      els.progressBar.style.width = value + "%";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeHeader(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function looksLikeModelHeader(v) {
      return v.includes("modelo") || v.includes("codigo") || v.includes("referencia");
    }

    function looksLikeSkuHeader(v) {
      return v.includes("sku") && v.includes("falabella");
    }

    function guessColumnIndexes(firstRow) {
      const normalized = firstRow.map(normalizeHeader);

      let modelIndex = normalized.findIndex(v => looksLikeModelHeader(v));
      let skuIndex = normalized.findIndex(v => looksLikeSkuHeader(v));

      if (modelIndex === -1) modelIndex = 0;
      if (skuIndex === -1) skuIndex = 1;

      return { modelIndex, skuIndex };
    }

    async function handleExcelChange(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const rows = await parseExcelFile(file);

        revokePreviewUrls();

        state.rawRows = rows;
        state.items = [];
        state.errors = [];
        state.manifestText = "";
        state.sourceFileName = file.name;
        state.rowResults = [];
        state.etamFinalZipBlob = null;
        state.etamFinalZipName = "";

        els.fileMeta.textContent = `${file.name} · ${rows.length} fila(s)`;
        renderSummary();
        renderResults();
        renderErrors();

        if (state.activeBrand === "etam") {
          setStatus(`${rows.length} fila(s) cargada(s). ETAM se procesará por bloques automáticos.`);
          setEtamRequestState("idle", "ETAM listo para procesar");
        } else {
          setStatus(`${rows.length} fila(s) cargada(s) desde ${file.name}.`);
        }

        setProgress(0);
      } catch (error) {
        console.error(error);
        setStatus("No se pudo leer el archivo.");
        if (state.activeBrand === "etam") {
          setEtamRequestState("error", "Error leyendo el Excel");
        }
      }
    }

    async function parseExcelFile(file) {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

      if (!matrix.length) return [];

      const { modelIndex, skuIndex } = guessColumnIndexes(matrix[0]);
      const firstRow = matrix[0].map(v => normalizeHeader(v));
      const firstRowLooksLikeHeader =
        firstRow.some(v => looksLikeModelHeader(v) || looksLikeSkuHeader(v)) ||
        (firstRow[0] && firstRow[0].includes("modelo")) ||
        (firstRow[1] && firstRow[1].includes("sku"));

      const startRow = firstRowLooksLikeHeader ? 1 : 0;

      const rows = [];
      for (let i = startRow; i < matrix.length; i++) {
        const row = matrix[i];
        const modelCode = String(row[modelIndex] ?? "").trim();
        const skuFalabella = String(row[skuIndex] ?? "").trim();

        if (!modelCode && !skuFalabella) continue;

        rows.push({
          rowNumber: i + 1,
          modelCode,
          skuFalabella
        });
      }

      return rows;
    }

    function downloadTemplate() {
      try {
        const activeBrand = BRANDS[state.activeBrand];
        const data = [
          { [activeBrand.templateHeader]: "", "Sku falabella": "" }
        ];

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Plantilla");
        XLSX.writeFile(wb, `plantilla-${activeBrand.id}.xlsx`);

        setStatus("Plantilla descargada.");
      } catch (error) {
        console.error(error);
        setStatus("No se pudo descargar la plantilla.");
      }
    }

    function clearAll() {
      revokePreviewUrls();

      els.excelFile.value = "";
      els.fileMeta.textContent = "Sin archivo cargado.";
      state.rawRows = [];
      state.items = [];
      state.errors = [];
      state.manifestText = "";
      state.sourceFileName = "";
      state.rowResults = [];
      state.etamFinalZipBlob = null;
      state.etamFinalZipName = "";

      renderSummary();
      renderResults();
      renderErrors();
      setStatus("Limpio.");
      setProgress(0);

      if (state.activeBrand === "etam") {
        setEtamRequestState("idle", "ETAM en espera");
      }
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 8000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timer);
      }
    }

    async function fetchBlobIfExistsDetailed(url, options = {}) {
      const fetchTimeoutMs = options.fetchTimeoutMs ?? 8000;

      try {
        const response = await fetchWithTimeout(url, {
          method: "GET",
          mode: "cors",
          cache: "no-store"
        }, fetchTimeoutMs);

        if (response.ok) {
          const blob = await response.blob();
          if (blob && blob.size > 0) {
            return { blob, exists: true };
          }
        }
      } catch (error) {
      }

      return { blob: null, exists: false };
    }

    function guessExtension(blob) {
      const type = String(blob?.type || "").toLowerCase();
      if (type.includes("avif")) return "avif";
      if (type.includes("png")) return "png";
      if (type.includes("webp")) return "webp";
      return "jpg";
    }

    function guessMimeFromFileName(fileName) {
      const lower = fileName.toLowerCase();
      if (lower.endsWith(".avif")) return "image/avif";
      if (lower.endsWith(".webp")) return "image/webp";
      if (lower.endsWith(".png")) return "image/png";
      if (lower.endsWith(".gif")) return "image/gif";
      return "image/jpeg";
    }

    function chunkRows(rows, size) {
      const chunks = [];
      for (let i = 0; i < rows.length; i += size) {
        chunks.push(rows.slice(i, i + size));
      }
      return chunks;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getUniqueFileName(fileName, usedNames) {
      const lower = fileName.toLowerCase();
      if (!usedNames.has(lower)) {
        usedNames.add(lower);
        return fileName;
      }

      const dotIndex = fileName.lastIndexOf(".");
      const hasExt = dotIndex > 0;
      const base = hasExt ? fileName.slice(0, dotIndex) : fileName;
      const ext = hasExt ? fileName.slice(dotIndex) : "";

      let counter = 1;
      let candidate = `${base}__dup${counter}${ext}`;

      while (usedNames.has(candidate.toLowerCase())) {
        counter += 1;
        candidate = `${base}__dup${counter}${ext}`;
      }

      usedNames.add(candidate.toLowerCase());
      return candidate;
    }

    function buildFinalEtamZipName() {
      const now = new Date();
      const YYYY = now.getFullYear();
      const MM = String(now.getMonth() + 1).padStart(2, "0");
      const DD = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      return `etam-final-${YYYY}${MM}${DD}-${hh}${mm}.zip`;
    }

    function parseManifestLineForSuccess(line) {
      const match = line.match(/^Fila\s+(\d+)\s+\|\s+(.*?)\s+\|\s+SKU\s+(.*?)\s+\|\s+(.*)$/);
      if (!match) return null;

      const rowNumber = Number(match[1]);
      const inputCode = String(match[2] || "").trim();
      const skuFalabella = String(match[3] || "").trim();
      const filesPart = String(match[4] || "").trim();

      const fileNames = filesPart
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);

      return {
        rowNumber,
        inputCode,
        skuFalabella,
        fileNames,
        rawLine: line
      };
    }

    function parseManifestLineForNoDownload(line) {
      const match = line.match(/^Fila\s+(\d+)\s+\|\s+(.*?)\s+\|\s+SKU\s+(.*)$/);
      if (!match) return null;

      return {
        rowNumber: Number(match[1]),
        inputCode: String(match[2] || "").trim(),
        skuFalabella: String(match[3] || "").trim(),
        rawLine: line
      };
    }

    function parseBatchManifestText(manifestText) {
      const lines = String(manifestText || "")
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(Boolean);

      let section = "";
      const successEntries = [];
      const noDownloadEntries = [];
      const fileMetaByName = {};

      for (const line of lines) {
        const upper = line.toUpperCase();

        if (upper === "DESCARGADO CORRECTAMENTE") {
          section = "ok";
          continue;
        }

        if (upper === "NO DESCARGO") {
          section = "bad";
          continue;
        }

        if (!line.startsWith("Fila ")) continue;

        if (section === "ok") {
          const entry = parseManifestLineForSuccess(line);
          if (!entry) continue;

          successEntries.push(entry);

          entry.fileNames.forEach(fileName => {
            fileMetaByName[fileName] = {
              rowNumber: entry.rowNumber,
              inputCode: entry.inputCode,
              skuFalabella: entry.skuFalabella
            };
          });
        }

        if (section === "bad") {
          const entry = parseManifestLineForNoDownload(line);
          if (!entry) continue;
          noDownloadEntries.push(entry);
        }
      }

      return {
        successEntries,
        noDownloadEntries,
        fileMetaByName
      };
    }

    function formatNoDownloadEntry(entry, extraText = "") {
      const suffix = extraText ? ` | ${extraText}` : "";
      return `Fila ${entry.rowNumber} | ${entry.inputCode || "(sin código)"} | SKU ${entry.skuFalabella || "(sin SKU)"}${suffix}`;
    }

    async function requestEtamBatch(batchRows, batchIndex, totalBatches) {
      const maxAttempts = 2;

      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          setEtamRequestState("loading", `Procesando bloque ${batchIndex} de ${totalBatches}... intento ${attempt}/${maxAttempts}`);
          setStatus(`ETAM: procesando bloque ${batchIndex} de ${totalBatches}...`);

          const response = await fetchWithTimeout(ETAM_BACKEND_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              rows: batchRows
            })
          }, ETAM_BATCH_TIMEOUT_MS);

          const contentType = response.headers.get("content-type") || "";

          if (!response.ok) {
            if (contentType.includes("application/json")) {
              const data = await response.json();
              return {
                ok: false,
                error: data.error || `Error en bloque ${batchIndex}.`,
                errors: Array.isArray(data.errors) ? data.errors : []
              };
            }

            return {
              ok: false,
              error: `Error HTTP ${response.status} en bloque ${batchIndex}.`,
              errors: []
            };
          }

          const blob = await response.blob();
          return { ok: true, blob };
        } catch (error) {
          if (attempt === maxAttempts) {
            return {
              ok: false,
              error: `Bloque ${batchIndex}: ${error.message || "Failed to fetch"}`,
              errors: []
            };
          }
          await sleep(800);
        }
      }

      return {
        ok: false,
        error: `Bloque ${batchIndex}: error desconocido.`,
        errors: []
      };
    }

    async function processEtamViaBackend() {
      revokePreviewUrls();

      state.items = [];
      state.errors = [];
      state.manifestText = "";
      state.rowResults = [];
      state.etamFinalZipBlob = null;
      state.etamFinalZipName = "";
      renderSummary();
      renderResults();
      renderErrors();

      const chunks = chunkRows(state.rawRows, ETAM_BATCH_SIZE);
      const finalZip = new JSZip();
      const usedNames = new Set();
      const overallErrors = [];
      const overallNoDownloadLines = [];
      const overallSuccessLines = [];
      let totalMergedFiles = 0;

      setEtamRequestState("loading", `Preparando ${chunks.length} bloque(s) ETAM...`);
      setStatus(`ETAM: preparando ${chunks.length} bloque(s)...`);
      setProgress(5);

      for (let i = 0; i < chunks.length; i++) {
        const batchNumber = i + 1;
        const batchRows = chunks[i];

        const startProgress = Math.round((i / chunks.length) * 80) + 10;
        setProgress(startProgress);

        const batchResult = await requestEtamBatch(batchRows, batchNumber, chunks.length);

        if (!batchResult.ok) {
          overallErrors.push(batchResult.error);
          if (batchResult.errors && batchResult.errors.length) {
            overallErrors.push(...batchResult.errors);
          }

          batchRows.forEach(row => {
            overallNoDownloadLines.push(
              formatNoDownloadEntry({
                rowNumber: row.rowNumber,
                inputCode: row.modelCode,
                skuFalabella: row.skuFalabella
              }, `bloque ${batchNumber} falló`)
            );
          });

          state.errors = [...overallErrors, ...overallNoDownloadLines];
          renderErrors();
          renderSummary();
          renderResults();

          setEtamRequestState("warn", `Bloque ${batchNumber} falló, continuando...`);
          setStatus(`ETAM: bloque ${batchNumber} falló, continuando...`);
          await sleep(300);
          continue;
        }

        try {
          const zipArrayBuffer = await batchResult.blob.arrayBuffer();
          const partialZip = await JSZip.loadAsync(zipArrayBuffer);
          const manifestFile = partialZip.file("manifest.txt");
          let fileMetaByName = {};

          if (manifestFile) {
            const manifestText = await manifestFile.async("string");
            const parsedManifest = parseBatchManifestText(manifestText);

            parsedManifest.successEntries.forEach(entry => {
              overallSuccessLines.push(entry.rawLine);
            });

            parsedManifest.noDownloadEntries.forEach(entry => {
              overallNoDownloadLines.push(formatNoDownloadEntry(entry));
            });

            fileMetaByName = parsedManifest.fileMetaByName;
          }

          const files = Object.values(partialZip.files).filter(file => !file.dir && file.name.toLowerCase() !== "manifest.txt");

          for (const file of files) {
            const bytes = await file.async("uint8array");
            const originalFileName = file.name;
            const finalFileName = getUniqueFileName(originalFileName, usedNames);

            finalZip.file(finalFileName, bytes);

            const meta = fileMetaByName[originalFileName] || {};
            const mime = guessMimeFromFileName(originalFileName);
            const previewBlob = new Blob([bytes], { type: mime });
            const previewUrl = URL.createObjectURL(previewBlob);

            const outputViewMatch = originalFileName.match(/_(\d+)\.[^.]+$/i);
            const outputView = outputViewMatch ? outputViewMatch[1] : "-";

            state.items.push({
              rowNumber: Number(meta.rowNumber || 0),
              inputCode: meta.inputCode || "ETAM",
              foundCode: originalFileName,
              skuFalabella: meta.skuFalabella || "",
              sourceView: outputView,
              imageUrl: previewUrl,
              previewUrl,
              outputFilename: finalFileName,
              blob: previewBlob
            });

            totalMergedFiles += 1;
          }

          state.items.sort((a, b) => {
            if (a.rowNumber !== b.rowNumber) return a.rowNumber - b.rowNumber;
            return String(a.outputFilename).localeCompare(String(b.outputFilename));
          });

          state.errors = [...overallErrors, ...overallNoDownloadLines];
          renderSummary();
          renderResults();
          renderErrors();

          const endProgress = Math.round((batchNumber / chunks.length) * 80) + 10;
          setProgress(endProgress);
          setEtamRequestState("loading", `Bloque ${batchNumber} de ${chunks.length} completado`);
          setStatus(`ETAM: bloque ${batchNumber} de ${chunks.length} completado`);
          await sleep(150);

        } catch (error) {
          overallErrors.push(`Bloque ${batchNumber}: no se pudo leer el ZIP parcial.`);
          batchRows.forEach(row => {
            overallNoDownloadLines.push(
              formatNoDownloadEntry({
                rowNumber: row.rowNumber,
                inputCode: row.modelCode,
                skuFalabella: row.skuFalabella
              }, `zip parcial inválido en bloque ${batchNumber}`)
            );
          });

          state.errors = [...overallErrors, ...overallNoDownloadLines];
          renderErrors();
          renderSummary();
          renderResults();

          setEtamRequestState("warn", `Bloque ${batchNumber} inválido, continuando...`);
          setStatus(`ETAM: bloque ${batchNumber} inválido, continuando...`);
          await sleep(300);
        }
      }

      if (totalMergedFiles === 0) {
        state.errors = [...overallErrors, ...overallNoDownloadLines];
        renderErrors();
        renderSummary();
        renderResults();
        setEtamRequestState("error", "ETAM con error");
        setProgress(0);
        setStatus(state.errors[0] || "No se pudo procesar ETAM.");
        return;
      }

      setEtamRequestState("loading", "Uniendo archivos ETAM...");
      setStatus("ETAM: uniendo archivos...");
      setProgress(94);

      const finalManifest = [];
      finalManifest.push("MANIFEST FINAL ETAM");
      finalManifest.push("");
      finalManifest.push(`Bloques procesados: ${chunks.length}`);
      finalManifest.push(`Archivos finales: ${totalMergedFiles}`);
      finalManifest.push("");

      finalManifest.push("DESCARGADO CORRECTAMENTE");
      finalManifest.push("");
      if (overallSuccessLines.length) {
        overallSuccessLines.forEach(line => finalManifest.push(line));
      } else {
        finalManifest.push("Sin registros.");
      }

      finalManifest.push("");
      finalManifest.push("NO DESCARGO");
      finalManifest.push("");
      if (overallNoDownloadLines.length) {
        overallNoDownloadLines.forEach(line => finalManifest.push(line));
      } else {
        finalManifest.push("Sin registros.");
      }

      if (overallErrors.length) {
        finalManifest.push("");
        finalManifest.push("ERRORES DE BLOQUE");
        finalManifest.push("");
        overallErrors.forEach(line => finalManifest.push(line));
      }

      finalZip.file("manifest.txt", finalManifest.join("\n"));

      const finalZipBlob = await finalZip.generateAsync({ type: "blob" });
      const finalZipName = buildFinalEtamZipName();

      state.etamFinalZipBlob = finalZipBlob;
      state.etamFinalZipName = finalZipName;
      state.errors = [...overallErrors, ...overallNoDownloadLines];

      renderSummary();
      renderResults();
      renderErrors();

      saveAs(finalZipBlob, finalZipName);

      setProgress(100);

      if (overallErrors.length || overallNoDownloadLines.length) {
        setEtamRequestState("warn", `ETAM parcial: ${totalMergedFiles} archivo(s) listos`);
        setStatus(`ZIP parcial ETAM descargado: ${finalZipName}`);
      } else {
        setEtamRequestState("success", `ETAM listo: ${totalMergedFiles} archivo(s)`);
        setStatus(`ZIP ETAM descargado: ${finalZipName}`);
      }
    }

    async function processRows() {
      const brand = BRANDS[state.activeBrand];
      if (!brand) return;

      if (!state.rawRows.length) {
        setStatus("Carga un Excel primero.");
        return;
      }

      if (brand.id === "etam") {
        els.btnProcess.disabled = true;
        els.btnDownloadZip.disabled = true;
        try {
          await processEtamViaBackend();
        } finally {
          els.btnProcess.disabled = false;
          els.btnDownloadZip.disabled = !state.etamFinalZipBlob;
        }
        return;
      }

      els.btnProcess.disabled = true;
      els.btnDownloadZip.disabled = true;

      revokePreviewUrls();

      state.items = [];
      state.errors = [];
      state.manifestText = "";
      state.rowResults = [];
      state.etamFinalZipBlob = null;
      state.etamFinalZipName = "";

      const usedNames = new Set();
      const totalRows = state.rawRows.length;

      setProgress(0);
      setStatus(`Buscando y descargando... 0/${totalRows}`);

      try {
        for (let rowIndex = 0; rowIndex < state.rawRows.length; rowIndex++) {
          const row = state.rawRows[rowIndex];
          const inputCode = String(row.modelCode || "").trim();
          const skuFalabella = String(row.skuFalabella || "").trim();

          const rowResult = {
            rowNumber: row.rowNumber,
            inputCode,
            skuFalabella,
            downloadedFiles: [],
            ok: false
          };

          if (!inputCode || !skuFalabella) {
            state.errors.push(`Fila ${row.rowNumber}: faltan datos.`);
            state.rowResults.push(rowResult);
            setProgress(Math.round(((rowIndex + 1) / totalRows) * 100));
            setStatus(`Buscando y descargando... ${rowIndex + 1}/${totalRows}`);
            continue;
          }

          const parsed = brand.parseCode(inputCode);

          if (!parsed) {
            state.errors.push(`Fila ${row.rowNumber}: código inválido "${inputCode}".`);
            state.rowResults.push(rowResult);
            setProgress(Math.round(((rowIndex + 1) / totalRows) * 100));
            setStatus(`Buscando y descargando... ${rowIndex + 1}/${totalRows}`);
            continue;
          }

          const candidateEntries = brand.getCandidateEntries(parsed);
          const foundItemsForRow = [];

          for (const entry of candidateEntries) {
            const result = await fetchBlobIfExistsDetailed(entry.url, { fetchTimeoutMs: 8000 });

            if (result.blob) {
              foundItemsForRow.push({
                rowNumber: row.rowNumber,
                inputCode,
                foundCode: entry.displayCode,
                skuFalabella,
                sourceView: entry.sourceLabel,
                imageUrl: entry.url,
                blob: result.blob
              });
            }
          }

          if (foundItemsForRow.length === 0) {
            if (parsed.type === "exact") {
              state.errors.push(`Fila ${row.rowNumber}: no existe "${inputCode}".`);
            } else {
              state.errors.push(`Fila ${row.rowNumber}: no se encontraron vistas para "${inputCode}".`);
            }

            state.rowResults.push(rowResult);
            setProgress(Math.round(((rowIndex + 1) / totalRows) * 100));
            setStatus(`Buscando y descargando... ${rowIndex + 1}/${totalRows}`);
            continue;
          }

          foundItemsForRow.forEach((item, index) => {
            const finalView = index + 1;
            const ext = guessExtension(item.blob);
            const outputFilename = `${item.skuFalabella}_${finalView}.${ext}`;
            const duplicateKey = outputFilename.toLowerCase();

            if (usedNames.has(duplicateKey)) {
              state.errors.push(`Fila ${item.rowNumber}: nombre repetido "${outputFilename}".`);
              return;
            }

            usedNames.add(duplicateKey);

            item.targetView = finalView;
            item.outputFilename = outputFilename;
            item.previewUrl = URL.createObjectURL(item.blob);

            state.items.push(item);
            rowResult.downloadedFiles.push(outputFilename);
          });

          rowResult.ok = rowResult.downloadedFiles.length > 0;
          state.rowResults.push(rowResult);

          setProgress(Math.round(((rowIndex + 1) / totalRows) * 100));
          setStatus(`Buscando y descargando... ${rowIndex + 1}/${totalRows}`);
        }

        state.items.sort((a, b) => {
          if (a.rowNumber !== b.rowNumber) return a.rowNumber - b.rowNumber;
          return a.targetView - b.targetView;
        });

        state.manifestText = buildManifestText();
        renderSummary();
        renderResults();
        renderErrors();

        if (state.items.length) {
          setStatus(`${state.items.length} imagen(es) lista(s) en memoria.`);
        } else {
          setStatus("No se encontraron imágenes descargables.");
        }
      } finally {
        els.btnProcess.disabled = false;
        els.btnDownloadZip.disabled = state.items.length === 0;
      }
    }

    function buildManifestText() {
      const okRows = state.rowResults.filter(row => row.ok);
      const badRows = state.rowResults.filter(row => !row.ok);

      const lines = [];

      lines.push("DESCARGADO CORRECTAMENTE");
      lines.push("");

      if (okRows.length) {
        okRows.forEach(row => {
          lines.push(
            `Fila ${row.rowNumber} | ${row.inputCode} | SKU ${row.skuFalabella} | ${row.downloadedFiles.join(", ")}`
          );
        });
      } else {
        lines.push("Sin registros.");
      }

      lines.push("");
      lines.push("NO DESCARGO");
      lines.push("");

      if (badRows.length) {
        badRows.forEach(row => {
          lines.push(
            `Fila ${row.rowNumber} | ${row.inputCode || "(sin código)"} | SKU ${row.skuFalabella || "(sin SKU)"}`
          );
        });
      } else {
        lines.push("Sin registros.");
      }

      return lines.join("\n");
    }

    function renderSummary() {
      els.summaryRows.textContent = String(state.rawRows.length);
      els.summaryReady.textContent = String(state.items.length);
      els.summaryErrors.textContent = String(state.errors.length);

      if (state.activeBrand === "etam") {
        els.btnDownloadZip.disabled = !state.etamFinalZipBlob;
      } else {
        els.btnDownloadZip.disabled = state.items.length === 0;
      }

      els.activeBrandLabel.textContent = BRANDS[state.activeBrand]?.label || "";
    }

    function renderResults() {
      if (!state.rawRows.length && !state.items.length) {
        els.resultsPanel.innerHTML = '<div class="empty">Carga un Excel y presiona Procesar.</div>';
        return;
      }

      if (!state.items.length) {
        if (state.activeBrand === "etam") {
          els.resultsPanel.innerHTML = '<div class="empty">ETAM se procesa por backend en bloques automáticos. A medida que salgan bloques correctos, las imágenes aparecerán aquí abajo.</div>';
        } else {
          els.resultsPanel.innerHTML = '<div class="empty">No hay imágenes listas todavía.</div>';
        }
        return;
      }

      const rowsHtml = state.items.map(item => {
        const sourceBadge = state.activeBrand === "etam" ? "Parcial" : "Lista";
        const sourceClass = state.activeBrand === "etam" ? "warn" : "ok";

        return `
          <tr>
            <td>${item.rowNumber || "-"}</td>
            <td>
              <div class="thumb">
                <img src="${escapeHtml(item.previewUrl)}" alt="${escapeHtml(item.outputFilename)}" loading="lazy">
              </div>
            </td>
            <td class="mono">${escapeHtml(item.inputCode || "-")}</td>
            <td class="mono">${escapeHtml(item.foundCode || "-")}</td>
            <td class="mono">${escapeHtml(item.sourceView || "-")}</td>
            <td class="mono">${escapeHtml(item.skuFalabella || "-")}</td>
            <td class="mono">${escapeHtml(item.outputFilename || "-")}</td>
            <td><span class="chip ${sourceClass}">${sourceBadge}</span></td>
            <td>
              <div class="row-actions">
                <button class="btn btn-secondary" data-open="${escapeHtml(item.imageUrl)}">Abrir</button>
                <button class="btn btn-primary" data-download="${escapeHtml(item.outputFilename)}">Descargar</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");

      els.resultsPanel.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fila</th>
                <th>Preview</th>
                <th>Entrada</th>
                <th>Encontrado</th>
                <th>Vista origen</th>
                <th>SKU Falabella</th>
                <th>Archivo final</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;

      els.resultsPanel.querySelectorAll("[data-open]").forEach(btn => {
        btn.addEventListener("click", () => {
          const url = btn.getAttribute("data-open");
          window.open(url, "_blank", "noopener,noreferrer");
        });
      });

      els.resultsPanel.querySelectorAll("[data-download]").forEach(btn => {
        btn.addEventListener("click", () => {
          const outputFilename = btn.getAttribute("data-download");
          const item = state.items.find(x => x.outputFilename === outputFilename);
          if (!item) return;
          downloadSingle(item);
        });
      });
    }

    function renderErrors() {
      if (!state.errors.length) {
        els.errorsPanel.innerHTML = "";
        return;
      }

      els.errorsPanel.innerHTML = `
        <section class="errors">
          <h3>Errores / No descarga</h3>
          <ol>
            ${state.errors.map(err => `<li>${escapeHtml(err)}</li>`).join("")}
          </ol>
        </section>
      `;
    }

    function downloadSingle(item) {
      try {
        setStatus(`Descargando ${item.outputFilename}...`);
        setProgress(100);
        saveAs(item.blob, item.outputFilename);
        setStatus(`Descarga completada: ${item.outputFilename}`);
      } catch (error) {
        console.error(error);
        setProgress(0);
        setStatus(`No se pudo descargar ${item.outputFilename}.`);
      }
    }

    async function downloadZip() {
      if (state.activeBrand === "etam") {
        if (!state.etamFinalZipBlob) {
          setStatus("No hay ZIP ETAM listo.");
          return;
        }

        saveAs(state.etamFinalZipBlob, state.etamFinalZipName || "etam-final.zip");
        setStatus(`ZIP ETAM descargado: ${state.etamFinalZipName || "etam-final.zip"}`);
        return;
      }

      if (!state.items.length) {
        setStatus("No hay imágenes listas.");
        return;
      }

      els.btnDownloadZip.disabled = true;
      els.btnProcess.disabled = true;

      try {
        const zip = new JSZip();
        const total = state.items.length;

        setProgress(0);
        setStatus(`Armando ZIP... 0/${total}`);

        for (let i = 0; i < state.items.length; i++) {
          const item = state.items[i];
          zip.file(item.outputFilename, item.blob);

          const done = i + 1;
          setProgress(Math.round((done / total) * 100));
          setStatus(`Armando ZIP... ${done}/${total}`);
        }

        if (state.manifestText) {
          zip.file("manifest.txt", state.manifestText);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const zipName = buildZipName();

        saveAs(zipBlob, zipName);
        setStatus(`ZIP generado: ${zipName}`);
      } catch (error) {
        console.error(error);
        setProgress(0);
        setStatus("No se pudo generar el ZIP.");
      } finally {
        els.btnDownloadZip.disabled = state.items.length === 0;
        els.btnProcess.disabled = false;
      }
    }

    function buildZipName() {
      const now = new Date();
      const YYYY = now.getFullYear();
      const MM = String(now.getMonth() + 1).padStart(2, "0");
      const DD = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      return `${state.activeBrand}-${YYYY}${MM}${DD}-${hh}${mm}.zip`;
    }

    init();
  </script>
</body>
</html>
